<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a20"/>
      <stop offset="100%" stop-color="#0a1a0e"/>
    </radialGradient>
    <!-- Gold gradient for text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8cc7a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <!-- Ball shine -->
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#f0ead8"/>
      <stop offset="100%" stop-color="#d4c9a8"/>
    </radialGradient>
    <!-- Pink gradient for daughter dot -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="198" fill="#c9a84c"/>
  <circle cx="200" cy="200" r="194" fill="#0a1a0e"/>

  <!-- Background -->
  <circle cx="200" cy="200" r="192" fill="url(#bgGrad)" clip-path="url(#circleClip)"/>

  <!-- Subtle grass line at bottom -->
  <ellipse cx="200" cy="310" rx="160" ry="18" fill="#1a3a20" opacity="0.6"/>
  <ellipse cx="200" cy="308" rx="150" ry="10" fill="#2d6a3f" opacity="0.3"/>

  <!-- Golf ball -->
  <circle cx="200" cy="178" r="58" fill="url(#ballGrad)" filter="url(#glow)"/>

  <!-- Ball dimples -->
  <g fill="none" stroke="#b8b0a0" stroke-width="0.8" opacity="0.5">
    <!-- Row 1 -->
    <circle cx="200" cy="138" r="5"/>
    <circle cx="215" cy="142" r="5"/>
    <circle cx="185" cy="142" r="5"/>
    <!-- Row 2 -->
    <circle cx="228" cy="155" r="5"/>
    <circle cx="200" cy="152" r="5"/>
    <circle cx="172" cy="155" r="5"/>
    <!-- Row 3 -->
    <circle cx="236" cy="170" r="5"/>
    <circle cx="212" cy="166" r="5"/>
    <circle cx="188" cy="166" r="5"/>
    <circle cx="164" cy="170" r="5"/>
    <!-- Row 4 -->
    <circle cx="240" cy="186" r="5"/>
    <circle cx="216" cy="182" r="5"/>
    <circle cx="200" cy="184" r="5"/>
    <circle cx="184" cy="182" r="5"/>
    <circle cx="160" cy="186" r="5"/>
    <!-- Row 5 -->
    <circle cx="236" cy="202" r="5"/>
    <circle cx="212" cy="198" r="5"/>
    <circle cx="188" cy="198" r="5"/>
    <circle cx="164" cy="202" r="5"/>
  </g>

  <!-- Spin trails / motion lines -->
  <g stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7" stroke-linecap="round">
    <line x1="106" y1="160" x2="88" y2="148"/>
    <line x1="100" y1="178" x2="78" y2="173"/>
    <line x1="106" y1="196" x2="84" y2="198"/>
    <line x1="294" y1="160" x2="312" y2="148"/>
    <line x1="300" y1="178" x2="322" y2="173"/>
    <line x1="294" y1="196" x2="316" y2="198"/>
  </g>
  <!-- Shorter inner trails -->
  <g stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <line x1="110" y1="148" x2="96" y2="140"/>
    <line x1="290" y1="148" x2="304" y2="140"/>
  </g>

  <!-- Flag on ball -->
  <line x1="200" y1="122" x2="200" y2="96" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="200,96 218,104 200,112" fill="url(#goldGrad)"/>

  <!-- SPINVIBES text -->
  <text
    x="200" y="262"
    font-family="Arial Black, sans-serif"
    font-weight="900"
    font-size="32"
    letter-spacing="6"
    fill="url(#goldGrad)"
    text-anchor="middle"
    dominant-baseline="middle">SPINVIBES</text>

  <!-- GOLF text -->
  <text
    x="200" y="292"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="14"
    letter-spacing="8"
    fill="#6a8a6e"
    text-anchor="middle"
    dominant-baseline="middle">G O L F</text>

  <!-- FAMILY text with colored dots -->
  <!-- Three small dots representing Dad · Son · Daughter -->
  <circle cx="164" cy="320" r="5" fill="#c9a84c"/>
  <circle cx="200" cy="320" r="5" fill="#3b82f6"/>
  <circle cx="236" cy="320" r="5" fill="url(#pinkGrad)"/>

  <!-- Thin separator lines -->
  <line x1="52" y1="310" x2="148" y2="310" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <line x1="252" y1="310" x2="348" y2="310" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>

  <!-- FAMILY label -->
  <text
    x="200" y="344"
    font-family="Arial, sans-serif"
    font-weight="300"
    font-size="11"
    letter-spacing="5"
    fill="#6a8a6e"
    text-anchor="middle"
    dominant-baseline="middle">F A M I L Y</text>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
</svg>
